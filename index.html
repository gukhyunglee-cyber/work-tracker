  // 🔧 수정: signInWithPopup으로 변경 (redirect → popup)
  function signInWithGoogle() {
    var provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt: 'select_account'});
    var btn = document.getElementById('google-login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span style="display:flex;align-items:center;gap:6px;">로그인 중...</span>';
    
    auth.signInWithPopup(provider)
      .then(function(result) {
        // 로그인 성공 - onAuthStateChanged에서 처리됨
        console.log('로그인 성공:', result.user);
      })
      .catch(function(e) {
        var el = document.getElementById('login-error');
        if(el) {
          el.textContent = e.message;
          el.style.display = 'block';
        }
        btn.disabled = false;
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"> Google';
        console.error('로그인 실패:', e);
      });
  }
