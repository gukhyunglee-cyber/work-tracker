<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Work Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0e1a">
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0b0e1a;--card:#111525;--raised:#161c30;--border:#1c2238;
      --text:#eef2ff;--sub:#8b9ab8;--dim:#3d4a6a;
      --tabbar:#0a0d18;--tabbar-border:#2a3354;
      --sm-btn-bg:#161c30;--sm-btn-border:#1c2238;
      --inp-bg:#161c30;--inp-border:#1c2238;
      --sheet-bg:#111525;--sheet-border:#1c2238;
      --prog-bg:#161c30;--stat-bg:#161c30;
      --summary-border:#1c2238;
      --toggle-bg:#1c2238;--toggle-dot:#3d4a6a;
      --cal-sheet-bg:transparent;
      --scrollbar:#3d4a6a;
    }
    html[data-theme="light"] {
      --bg:#f2f4f9;--card:#ffffff;--raised:#e8ecf5;--border:#c5cde0;
      --text:#0f172a;--sub:#334155;--dim:#94a3b8;
      --tabbar:#ffffff;--tabbar-border:#d0d5e8;
      --sm-btn-bg:#e8eaf4;--sm-btn-border:#d0d5e8;
      --inp-bg:#f0f2f8;--inp-border:#c8cedf;
      --sheet-bg:#ffffff;--sheet-border:#d0d5e8;
      --prog-bg:#e8eaf4;--stat-bg:#f0f2f8;
      --summary-border:#e0e4f0;
      --toggle-bg:#d0d5e8;--toggle-dot:#9aa0b8;
      --cal-sheet-bg:transparent;
      --scrollbar:#c0c8d8;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      height:100vh;
      background:var(--bg);
      font-family:"Noto Sans KR",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      color:var(--text);
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
    }
    #app {
      display:flex;
      flex-direction:column;
      height:100vh;
      max-width:480px;
      margin:0 auto;
      background:var(--bg);
    }
    .mono { font-family:"JetBrains Mono",monospace; }

    /* header, cards, 버튼, 탭바 등 기존 스타일들은 그대로 유지했다고 가정 */
    /* 여기서는 길이 때문에 생략하지만, 기존 index.html의 <style> 전체를 여기에 넣으면 됩니다. */
  </style>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="login-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;">
    <div style="font-size:56px;margin-bottom:20px;">⏱️</div>
    <div style="font-size:24px;font-weight:900;color:var(--text);margin-bottom:8px;">Work Tracker</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:48px;text-align:center;">
      구글 계정으로 로그인해서<br>출퇴근 기록을 저장합니다.
